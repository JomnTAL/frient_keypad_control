blueprint:
  name: Frient KEPZB-110 Keypad for Alarmo (Fixed)
  description: |
    Manage PIN codes and RFID badges to arm/disarm Alarmo using the Frient Keypad.

    Features:
    - LED sync fix: Reverts keypad LEDs when codes are invalid
    - Pre-validation of codes before Alarmo actions
    - Syncs keypad state with Alarmo state changes
  domain: automation
  input:
    keypad:
      name: Frient Keypad
      description: The Frient KEPZB-110 keypad device
      selector:
        device:
          integration: zha
    alarm_panel:
      name: Keypad Alarm Panel Entity
      description: The alarm_control_panel entity for the keypad (controls LEDs)
      selector:
        entity:
          domain: alarm_control_panel
    mirror_alarm_panel:
      name: Alarm Panel to Mirror (Alarmo)
      description: The Alarmo alarm panel to synchronize with
      default: alarm_control_panel.alarmo
      selector:
        entity:
          domain: alarm_control_panel
    pin_list:
      name: Valid PIN Codes
      description: List of valid PIN codes, separated by semicolons
      default: ""
      selector:
        text: {}
    rfid_list:
      name: RFID List
      description: List of valid RFID identifiers (with + prefix), separated by semicolons
      default: ""
      selector:
        text: {}
    default_pin:
      name: ZHA Keypad Code (for LED sync)
      description: The PIN configured in ZHA settings for the keypad
      default: "0000"
      selector:
        text: {}
    mirror_default_pin:
      name: Default PIN for Alarmo
      description: Fallback PIN for Alarmo operations
      default: "0000"
      selector:
        text: {}
    require_code_for_arm:
      name: Require Code for Arming
      default: true
      selector:
        boolean: {}
    require_code_for_disarm:
      name: Require Code for Disarming
      default: true
      selector:
        boolean: {}

trigger:
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input keypad
      command: arm
    id: keypad_event

  - platform: state
    entity_id: !input mirror_alarm_panel
    id: alarmo_state_change

variables:
  pin_list_var: !input pin_list
  pin_list: "{{ pin_list_var.split(';') | map('trim') | select('!=', '') | list }}"
  rfid_list_var: !input rfid_list
  rfid_list: "{{ rfid_list_var.split(';') | map('trim') | select('!=', '') | list }}"
  all_valid_codes: "{{ pin_list + rfid_list }}"
  mirror_default_pin: !input mirror_default_pin
  require_arm: !input require_code_for_arm
  require_disarm: !input require_code_for_disarm

condition: []

action:
  - choose:
      # === KEYPAD EVENT HANDLING ===
      - conditions:
          - condition: trigger
            id: keypad_event
          - condition: template
            value_template: "{{ trigger.event.data.command == 'arm' }}"
        sequence:
          - variables:
              entered_code: "{{ trigger.event.data.args.code | default('') | trim }}"
              arm_mode: "{{ trigger.event.data.args.arm_mode | default(-1) | int }}"
          - choose:
              # DISARM
              - conditions:
                  - condition: template
                    value_template: "{{ arm_mode == 0 }}"
                  - condition: state
                    entity_id: !input alarm_panel
                    state:
                      - "armed_home"
                      - "armed_away"
                      - "armed_night"
                      - "triggered"
                sequence:
                  - choose:
                      # Valid code or code not required - proceed with disarm
                      - conditions:
                          - condition: template
                            value_template: "{{ not require_disarm or (entered_code in all_valid_codes and entered_code != '') }}"
                        sequence:
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input mirror_alarm_panel
                            data:
                              code: "{{ entered_code if entered_code != '' else mirror_default_pin }}"
                      # Invalid code - revert LED to armed state
                      - conditions:
                          - condition: template
                            value_template: "{{ require_disarm and (entered_code not in all_valid_codes or entered_code == '') }}"
                        sequence:
                          - delay:
                              milliseconds: 100
                          - service: alarm_control_panel.alarm_arm_away
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                    default: []

              # ARM HOME
              - conditions:
                  - condition: template
                    value_template: "{{ arm_mode == 1 }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ not require_arm or (entered_code in all_valid_codes and entered_code != '') }}"
                        sequence:
                          - service: alarm_control_panel.alarm_arm_home
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                          - service: alarm_control_panel.alarm_arm_home
                            target:
                              entity_id: !input mirror_alarm_panel
                            data:
                              code: "{{ entered_code if entered_code != '' else mirror_default_pin }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ require_arm and (entered_code not in all_valid_codes or entered_code == '') }}"
                        sequence:
                          - delay:
                              milliseconds: 100
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                    default: []

              # ARM NIGHT
              - conditions:
                  - condition: template
                    value_template: "{{ arm_mode == 2 }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ not require_arm or (entered_code in all_valid_codes and entered_code != '') }}"
                        sequence:
                          - service: alarm_control_panel.alarm_arm_night
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                          - service: alarm_control_panel.alarm_arm_night
                            target:
                              entity_id: !input mirror_alarm_panel
                            data:
                              code: "{{ entered_code if entered_code != '' else mirror_default_pin }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ require_arm and (entered_code not in all_valid_codes or entered_code == '') }}"
                        sequence:
                          - delay:
                              milliseconds: 100
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                    default: []

              # ARM AWAY
              - conditions:
                  - condition: template
                    value_template: "{{ arm_mode == 3 }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ not require_arm or (entered_code in all_valid_codes and entered_code != '') }}"
                        sequence:
                          - service: alarm_control_panel.alarm_arm_away
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                          - service: alarm_control_panel.alarm_arm_away
                            target:
                              entity_id: !input mirror_alarm_panel
                            data:
                              code: "{{ entered_code if entered_code != '' else mirror_default_pin }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ require_arm and (entered_code not in all_valid_codes or entered_code == '') }}"
                        sequence:
                          - delay:
                              milliseconds: 100
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                    default: []

      # === ALARMO STATE CHANGE HANDLING ===
      - conditions:
          - condition: trigger
            id: alarmo_state_change
        sequence:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "disarmed"
                sequence:
                  - service: alarm_control_panel.alarm_disarm
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin

              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "armed_home"
                sequence:
                  - service: alarm_control_panel.alarm_arm_home
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin

              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "armed_night"
                sequence:
                  - service: alarm_control_panel.alarm_arm_night
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin

              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "armed_away"
                sequence:
                  - service: alarm_control_panel.alarm_arm_away
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin

              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "triggered"
                sequence:
                  - service: alarm_control_panel.alarm_trigger
                    target:
                      entity_id: !input alarm_panel
    default: []

mode: single
