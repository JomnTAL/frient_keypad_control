blueprint:
  name: Frient KEPZB-110 Keypad for Alarmo (Fixed Sync)
  description: |
    Manage PIN codes and RFID badges to arm/disarm Alarmo using the Frient Keypad.

    Key principle: Alarmo state drives keypad LED (not vice versa)
  domain: automation
  input:
    keypad:
      name: Frient Keypad
      selector:
        device:
          integration: zha
    alarm_panel:
      name: Keypad Alarm Panel Entity (for LED control)
      selector:
        entity:
          domain: alarm_control_panel
    mirror_alarm_panel:
      name: Alarm Panel to Mirror (Alarmo)
      default: alarm_control_panel.alarmo
      selector:
        entity:
          domain: alarm_control_panel
    pin_list:
      name: Valid PIN Codes (semicolon separated)
      default: ""
      selector:
        text: {}
    rfid_list:
      name: RFID List (semicolon separated, with + prefix)
      default: ""
      selector:
        text: {}
    default_pin:
      name: ZHA Keypad Code (for LED sync)
      default: "0000"
      selector:
        text: {}
    mirror_default_pin:
      name: Default PIN for Alarmo
      default: "0000"
      selector:
        text: {}
    require_code_for_arm:
      name: Require Code for Arming
      default: true
      selector:
        boolean: {}
    require_code_for_disarm:
      name: Require Code for Disarming
      default: true
      selector:
        boolean: {}

trigger:
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input keypad
      command: arm
    id: keypad_event

  - platform: state
    entity_id: !input mirror_alarm_panel
    id: alarmo_state_change

variables:
  pin_list_var: !input pin_list
  pin_list: "{{ pin_list_var.split(';') | map('trim') | select('!=', '') | list }}"
  rfid_list_var: !input rfid_list
  rfid_list: "{{ rfid_list_var.split(';') | map('trim') | select('!=', '') | list }}"
  all_valid_codes: "{{ pin_list + rfid_list }}"
  mirror_default_pin: !input mirror_default_pin
  require_arm: !input require_code_for_arm
  require_disarm: !input require_code_for_disarm
  keypad_pin: !input default_pin

condition: []

action:
  - choose:
      # === KEYPAD EVENT: Only control Alarmo, NOT the keypad ===
      - conditions:
          - condition: trigger
            id: keypad_event
        sequence:
          - variables:
              entered_code: "{{ trigger.event.data.args.code | default('') | trim }}"
              arm_mode: "{{ trigger.event.data.args.arm_mode | default(-1) | int }}"
              is_valid: "{{ entered_code in all_valid_codes and entered_code != '' }}"
              alarm_state: "{{ states(mirror_alarm_panel) }}"

          - choose:
              # DISARM (arm_mode == 0)
              - conditions:
                  - condition: template
                    value_template: "{{ arm_mode == 0 }}"
                  - condition: template
                    value_template: "{{ alarm_state in ['armed_home', 'armed_away', 'armed_night', 'triggered', 'pending'] }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ not require_disarm or is_valid }}"
                        sequence:
                          # Only disarm Alarmo - let state change sync the keypad
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input mirror_alarm_panel
                            data:
                              code: "{{ entered_code if entered_code != '' else mirror_default_pin }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ require_disarm and not is_valid }}"
                        sequence:
                          # Invalid code - immediately revert keypad LED
                          - service: alarm_control_panel.alarm_arm_away
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: "{{ keypad_pin }}"
                    default: []

              # ARM HOME (arm_mode == 1)
              - conditions:
                  - condition: template
                    value_template: "{{ arm_mode == 1 }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ not require_arm or is_valid }}"
                        sequence:
                          - service: alarm_control_panel.alarm_arm_home
                            target:
                              entity_id: !input mirror_alarm_panel
                            data:
                              code: "{{ entered_code if entered_code != '' else mirror_default_pin }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ require_arm and not is_valid }}"
                        sequence:
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: "{{ keypad_pin }}"
                    default: []

              # ARM NIGHT (arm_mode == 2)
              - conditions:
                  - condition: template
                    value_template: "{{ arm_mode == 2 }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ not require_arm or is_valid }}"
                        sequence:
                          - service: alarm_control_panel.alarm_arm_night
                            target:
                              entity_id: !input mirror_alarm_panel
                            data:
                              code: "{{ entered_code if entered_code != '' else mirror_default_pin }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ require_arm and not is_valid }}"
                        sequence:
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: "{{ keypad_pin }}"
                    default: []

              # ARM AWAY (arm_mode == 3)
              - conditions:
                  - condition: template
                    value_template: "{{ arm_mode == 3 }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ not require_arm or is_valid }}"
                        sequence:
                          - service: alarm_control_panel.alarm_arm_away
                            target:
                              entity_id: !input mirror_alarm_panel
                            data:
                              code: "{{ entered_code if entered_code != '' else mirror_default_pin }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ require_arm and not is_valid }}"
                        sequence:
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: "{{ keypad_pin }}"
                    default: []
            default: []

      # === ALARMO STATE CHANGE: Sync keypad LED to match Alarmo ===
      - conditions:
          - condition: trigger
            id: alarmo_state_change
        sequence:
          - variables:
              new_state: "{{ states(mirror_alarm_panel) }}"
              old_state: "{{ state_attr(mirror_alarm_panel, 'previous_state') | default('unknown') }}"
          - choose:
              # DISARMED
              - conditions:
                  - condition: template
                    value_template: "{{ new_state == 'disarmed' }}"
                sequence:
                  - service: alarm_control_panel.alarm_disarm
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: "{{ keypad_pin }}"

              # ARMED_HOME
              - conditions:
                  - condition: template
                    value_template: "{{ new_state == 'armed_home' }}"
                sequence:
                  - service: alarm_control_panel.alarm_arm_home
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: "{{ keypad_pin }}"

              # ARMED_NIGHT
              - conditions:
                  - condition: template
                    value_template: "{{ new_state == 'armed_night' }}"
                sequence:
                  - service: alarm_control_panel.alarm_arm_night
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: "{{ keypad_pin }}"

              # ARMED_AWAY
              - conditions:
                  - condition: template
                    value_template: "{{ new_state == 'armed_away' }}"
                sequence:
                  - service: alarm_control_panel.alarm_arm_away
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: "{{ keypad_pin }}"

              # PENDING / ACTIVATING (exit/entry delay) - show as armed
              - conditions:
                  - condition: template
                    value_template: "{{ new_state in ['pending', 'activating', 'arming'] }}"
                sequence:
                  - service: alarm_control_panel.alarm_arm_away
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: "{{ keypad_pin }}"

              # TRIGGERED
              - conditions:
                  - condition: template
                    value_template: "{{ new_state == 'triggered' }}"
                sequence:
                  - service: alarm_control_panel.alarm_trigger
                    target:
                      entity_id: !input alarm_panel
    default: []

mode: single
