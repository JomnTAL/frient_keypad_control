blueprint:
  name: Frient KEPZB-110 Keypad for Alarmo (Debug Version)
  description: |
    Manage PIN codes and RFID badges to arm/disarm Alarmo using the Frient Keypad.
    Check Home Assistant logs for debug output.
  domain: automation
  input:
    keypad:
      name: Frient Keypad
      selector:
        device:
          integration: zha
    alarm_panel:
      name: Keypad Alarm Panel Entity
      selector:
        entity:
          domain: alarm_control_panel
    mirror_alarm_panel:
      name: Alarm Panel to Mirror (Alarmo)
      default: alarm_control_panel.alarmo
      selector:
        entity:
          domain: alarm_control_panel
    pin_list:
      name: Valid PIN Codes (semicolon separated)
      default: ""
      selector:
        text: {}
    rfid_list:
      name: RFID List (semicolon separated)
      default: ""
      selector:
        text: {}
    default_pin:
      name: ZHA Keypad Code
      default: "0000"
      selector:
        text: {}
    mirror_default_pin:
      name: Default PIN for Alarmo
      default: "0000"
      selector:
        text: {}
    require_code_for_arm:
      name: Require Code for Arming
      default: true
      selector:
        boolean: {}
    require_code_for_disarm:
      name: Require Code for Disarming
      default: true
      selector:
        boolean: {}

trigger:
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input keypad
      command: arm
    id: keypad_event

  - platform: state
    entity_id: !input mirror_alarm_panel
    id: alarmo_state_change

variables:
  pin_list_var: !input pin_list
  pin_list: "{{ pin_list_var.split(';') | map('trim') | select('!=', '') | list }}"
  rfid_list_var: !input rfid_list
  rfid_list: "{{ rfid_list_var.split(';') | map('trim') | select('!=', '') | list }}"
  all_valid_codes: "{{ pin_list + rfid_list }}"
  mirror_default_pin: !input mirror_default_pin
  require_arm: !input require_code_for_arm
  require_disarm: !input require_code_for_disarm

condition: []

action:
  - choose:
      # === KEYPAD EVENT ===
      - conditions:
          - condition: trigger
            id: keypad_event
        sequence:
          # Debug logging
          - service: system_log.write
            data:
              level: info
              message: "Keypad event received - command: {{ trigger.event.data.command }}, args: {{ trigger.event.data.args }}"

          # DISARM (arm_mode == 0)
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.event.data.args.arm_mode == 0 }}"
                  - condition: state
                    entity_id: !input alarm_panel
                    state:
                      - "armed_home"
                      - "armed_away"
                      - "armed_night"
                      - "triggered"
                sequence:
                  - variables:
                      entered_code: "{{ trigger.event.data.args.code | default('') | trim }}"
                      is_valid: "{{ entered_code in all_valid_codes and entered_code != '' }}"
                  - service: system_log.write
                    data:
                      level: info
                      message: "DISARM requested - code: '{{ entered_code }}', valid: {{ is_valid }}, require_disarm: {{ require_disarm }}"
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ not require_disarm or is_valid }}"
                        sequence:
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input mirror_alarm_panel
                            data:
                              code: "{{ entered_code if entered_code != '' else mirror_default_pin }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ require_disarm and not is_valid }}"
                        sequence:
                          - service: system_log.write
                            data:
                              level: warning
                              message: "DISARM rejected - invalid code, reverting LED"
                          - delay:
                              milliseconds: 100
                          - service: alarm_control_panel.alarm_arm_away
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                    default: []

              # ARM HOME (arm_mode == 1)
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.event.data.args.arm_mode == 1 }}"
                sequence:
                  - variables:
                      entered_code: "{{ trigger.event.data.args.code | default('') | trim }}"
                      is_valid: "{{ entered_code in all_valid_codes and entered_code != '' }}"
                  - service: system_log.write
                    data:
                      level: info
                      message: "ARM_HOME requested - code: '{{ entered_code }}', valid: {{ is_valid }}"
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ not require_arm or is_valid }}"
                        sequence:
                          - service: alarm_control_panel.alarm_arm_home
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                          - service: alarm_control_panel.alarm_arm_home
                            target:
                              entity_id: !input mirror_alarm_panel
                            data:
                              code: "{{ entered_code if entered_code != '' else mirror_default_pin }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ require_arm and not is_valid }}"
                        sequence:
                          - service: system_log.write
                            data:
                              level: warning
                              message: "ARM_HOME rejected - invalid code, reverting LED"
                          - delay:
                              milliseconds: 100
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                    default: []

              # ARM NIGHT (arm_mode == 2)
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.event.data.args.arm_mode == 2 }}"
                sequence:
                  - variables:
                      entered_code: "{{ trigger.event.data.args.code | default('') | trim }}"
                      is_valid: "{{ entered_code in all_valid_codes and entered_code != '' }}"
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ not require_arm or is_valid }}"
                        sequence:
                          - service: alarm_control_panel.alarm_arm_night
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                          - service: alarm_control_panel.alarm_arm_night
                            target:
                              entity_id: !input mirror_alarm_panel
                            data:
                              code: "{{ entered_code if entered_code != '' else mirror_default_pin }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ require_arm and not is_valid }}"
                        sequence:
                          - delay:
                              milliseconds: 100
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                    default: []

              # ARM AWAY (arm_mode == 3)
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.event.data.args.arm_mode == 3 }}"
                sequence:
                  - variables:
                      entered_code: "{{ trigger.event.data.args.code | default('') | trim }}"
                      is_valid: "{{ entered_code in all_valid_codes and entered_code != '' }}"
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ not require_arm or is_valid }}"
                        sequence:
                          - service: alarm_control_panel.alarm_arm_away
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                          - service: alarm_control_panel.alarm_arm_away
                            target:
                              entity_id: !input mirror_alarm_panel
                            data:
                              code: "{{ entered_code if entered_code != '' else mirror_default_pin }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ require_arm and not is_valid }}"
                        sequence:
                          - delay:
                              milliseconds: 100
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                    default: []
            default: []

      # === ALARMO STATE CHANGE ===
      - conditions:
          - condition: trigger
            id: alarmo_state_change
        sequence:
          - service: system_log.write
            data:
              level: info
              message: "Alarmo state changed to: {{ states(mirror_alarm_panel) }}"
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "disarmed"
                sequence:
                  - service: alarm_control_panel.alarm_disarm
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin

              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "armed_home"
                sequence:
                  - service: alarm_control_panel.alarm_arm_home
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin

              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "armed_night"
                sequence:
                  - service: alarm_control_panel.alarm_arm_night
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin

              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "armed_away"
                sequence:
                  - service: alarm_control_panel.alarm_arm_away
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin

              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "triggered"
                sequence:
                  - service: alarm_control_panel.alarm_trigger
                    target:
                      entity_id: !input alarm_panel
    default: []

mode: single
