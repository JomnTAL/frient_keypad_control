blueprint:
  name: Keypad Frient (KEPZB-110) for Alarmo - LED Fix & Code Validation
  description: |
    Fork of Darktoinon's blueprint with critical fixes:
    - LED false-positive fix (immediately reverts keypad when codes invalid)
    - Pre-validation of PIN/RFID codes before Alarmo actions
    - Security: Blocks empty codes when required

    Manage multiple PIN codes and RFID badges with Frient KEPZB-110 keypad synchronized to Alarmo.
  domain: automation
  input:
    language:
      name: Language
      selector:
        select:
          options:
            - "EN"
            - "FR"
    keypad:
      name: Frient Keypad
      selector:
        device:
          integration: zha
    alarm_panel:
      name: Keypad Alarm Panel Entity
      description: The alarm_control_panel entity for the keypad (LED control)
      selector:
        entity:
          domain: alarm_control_panel
    mirror_alarm_panel:
      name: Alarm Panel to Mirror (Alarmo)
      default: alarm_control_panel.alarmo
      selector:
        entity:
          domain: alarm_control_panel
    pin_list:
      name: Valid PIN Codes
      description: Semicolon-separated list (e.g., 1234;5678;0000)
      default: ""
      selector:
        text: {}
    rfid_list:
      name: RFID List
      description: Semicolon-separated, with + prefix (e.g., +A1B2C3D4;+12345678)
      selector:
        text: {}
    default_pin:
      name: ZHA Keypad Code (for LED sync)
      description: The code configured in ZHA integration settings (Settings > ZHA > Configure > Keypad)
      default: "0000"
      selector:
        text: {}
    require_code_for_arm:
      name: Require Code for Arming
      default: true
      selector:
        boolean: {}
    require_code_for_disarm:
      name: Require Code for Disarming
      default: true
      selector:
        boolean: {}

trigger:
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input keypad
      command: arm
    id: keypad_event

  - platform: state
    entity_id: !input mirror_alarm_panel
    id: alarmo_state_change

variables:
  language: !input language
  pin_list_var: !input pin_list
  pin_list: "{{ pin_list_var.split(';') | map('trim') | select('!=', '') | list }}"
  rfid_list_var: !input rfid_list
  rfid_list: "{{ rfid_list_var.split(';') | map('trim') | select('!=', '') | list }}"
  all_valid_codes: "{{ pin_list + rfid_list }}"

  entered_code: "{{ trigger.event.data.args.code | default('') | trim }}"
  arm_mode: "{{ trigger.event.data.args.arm_mode | default(-1) | int }}"

  is_code_valid: "{{ entered_code in all_valid_codes and entered_code != '' }}"

  require_arm: !input require_code_for_arm
  require_disarm: !input require_code_for_disarm

  action_type: >
    {% if arm_mode == 0 %}
      disarm
    {% elif arm_mode == 1 %}
      arm_home
    {% elif arm_mode == 2 %}
      arm_night
    {% elif arm_mode == 3 %}
      arm_away
    {% else %}
      unknown
    {% endif %}

  should_execute: >
    {% if action_type == 'disarm' %}
      {{ not require_disarm or is_code_valid }}
    {% elif action_type in ['arm_home', 'arm_night', 'arm_away'] %}
      {{ not require_arm or is_code_valid }}
    {% else %}
      false
    {% endif %}

  # FIXED: Use single quotes for YAML outer, double quotes for French text with apostrophes
  text_arm_home: '{{ "Arm Home" if language == "EN" else "Armer à la maison" }}'
  text_arm_night: '{{ "Arm Night" if language == "EN" else "Armer la nuit" }}'
  text_arm_away: '{{ "Arm Away" if language == "EN" else "Armer à l''extérieur" }}'
  text_disarm: "{{ 'Disarm' if language == 'EN' else 'Désarmer' }}"
  text_invalid_code: "{{ 'Invalid code' if language == 'EN' else 'Code invalide' }}"

action:
  - choose:
      - conditions:
          - condition: trigger
            id: keypad_event
        sequence:
          - choose:
              - conditions: "{{ should_execute }}"
                sequence:
                  - choose:
                      - conditions: "{{ action_type == 'disarm' }}"
                        sequence:
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                          - service: alarmo.disarm
                            target:
                              entity_id: !input mirror_alarm_panel
                            data:
                              code: "{{ entered_code }}"
                          - delay:
                              milliseconds: 200
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin

                      - conditions: "{{ action_type == 'arm_home' }}"
                        sequence:
                          - service: alarmo.arm
                            target:
                              entity_id: !input mirror_alarm_panel
                            data:
                              code: "{{ entered_code }}"
                              mode: home
                          - delay:
                              milliseconds: 200
                          - service: alarm_control_panel.alarm_arm_home
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin

                      - conditions: "{{ action_type == 'arm_night' }}"
                        sequence:
                          - service: alarmo.arm
                            target:
                              entity_id: !input mirror_alarm_panel
                            data:
                              code: "{{ entered_code }}"
                              mode: night
                          - delay:
                              milliseconds: 200
                          - service: alarm_control_panel.alarm_arm_night
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin

                      - conditions: "{{ action_type == 'arm_away' }}"
                        sequence:
                          - service: alarmo.arm
                            target:
                              entity_id: !input mirror_alarm_panel
                            data:
                              code: "{{ entered_code }}"
                              mode: away
                          - delay:
                              milliseconds: 200
                          - service: alarm_control_panel.alarm_arm_away
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                    default: []

              - conditions: "{{ not should_execute }}"
                sequence:
                  - delay:
                      milliseconds: 100
                  - choose:
                      - conditions: "{{ states(mirror_alarm_panel) in ['armed_away', 'armed_home', 'armed_night', 'pending', 'triggered'] }}"
                        sequence:
                          - service: alarm_control_panel.alarm_arm_away
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                      - conditions: "{{ states(mirror_alarm_panel) == 'disarmed' }}"
                        sequence:
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                    default: []

      - conditions:
          - condition: trigger
            id: alarmo_state_change
        sequence:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "disarmed"
                sequence:
                  - service: alarm_control_panel.alarm_disarm
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin

              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "armed_home"
                sequence:
                  - service: alarm_control_panel.alarm_arm_home
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin

              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "armed_night"
                sequence:
                  - service: alarm_control_panel.alarm_arm_night
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin

              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "armed_away"
                sequence:
                  - service: alarm_control_panel.alarm_arm_away
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin

              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "triggered"
                sequence:
                  - service: alarm_control_panel.alarm_trigger
                    target:
                      entity_id: !input alarm_panel
    default: []

mode: single
