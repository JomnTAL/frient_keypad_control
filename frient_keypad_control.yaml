blueprint:
  name: Keypad Frient (KEPZB-110) for Alarmo - LED Fix & Code Validation
  description: |
    **Fork of Darktoinon's original with critical fixes:**

    **Fixes:**
    - **LED False-Positive Fix**: When no code/invalid code is entered, immediately reverts keypad LED to match Alarmo's actual state (prevents "visually disarmed but actually armed" lockout)
    - **Code Validation**: Verifies PIN/RFID against authorized lists before attempting to arm/disarm
    - **Security**: Prevents arming/disarming with empty codes (no longer falls back to default PIN for empty input)

    **Features:**
    - Manage multiple PIN codes and RFID badges
    - Synchronize Frient keypad status with Alarmo or other alarm panels
    - Support for arm home/night/away and disarm
    - Bilingual (EN/FR)

    **Setup Requirements:**
    1. Create identical PIN/RFID codes in Alarmo users
    2. Set ZHA keypad code in integration config
    3. Enter semicolon-separated codes in blueprint inputs
  domain: automation
  input:
    language:
      name: Choose Language / Choisir la langue
      description: "Select the language for notifications / Sélectionnez la langue pour les notifications."
      selector:
        select:
          options:
            - "EN"
            - "FR"
    keypad:
      name: Frient Keypad
      description: |
        The Frient KEPZB-110 keypad device (ZHA).
        Le clavier Frient KEPZB-110 (ZHA).
      selector:
        device:
          integration: zha
    alarm_panel:
      name: Alarm Panel (Keypad Entity)
      description: |
        The Frient alarm control panel entity (controls keypad LEDs).
        L'entité alarm control panel du Frient (contrôle les LEDs).
      selector:
        entity:
          domain: alarm_control_panel
    mirror_alarm_panel:
      name: Alarm Panel to Mirror (Alarmo)
      description: |
        Your Alarmo alarm panel entity to synchronize with.
        Votre entité Alarmo à synchroniser.
      default: alarm_control_panel.alarmo
      selector:
        entity:
          domain: alarm_control_panel
    pin_list:
      name: Valid PIN Codes / Codes PIN valides
      description: |
        List of valid PIN codes, separated by semicolons (;).
        Example: 1234;5678;0000
        Liste des codes PIN valides, séparés par des points-virgules (;).
      default: ""
      selector:
        text: {}
    rfid_list:
      name: RFID List / Liste des badges RFID
      description: |
        List of valid RFID codes (with + prefix), separated by semicolons (;).
        Example: +A1B2C3D4;+12345678
        Liste des codes RFID valides (avec préfixe +), séparés par des points-virgules (;).
      selector:
        text: {}
    default_pin:
      name: Default PIN for Keypad LED Sync / Code PIN par défaut pour synchronisation LED
      description: |
        The ZHA keypad code (from ZHA integration config) used ONLY for LED state sync.
        Le code configuré dans l'intégration ZHA (uniquement pour la synchro LED).
      default: "0000"
      selector:
        text: {}
    require_code_for_arm:
      name: Require Code for Arming / Code requis pour l'armement
      description: |
        If enabled, requires a valid PIN/RFID to arm. If disabled, arming works without code.
        Si activé, nécessite un code valide pour armer.
      default: true
      selector:
        boolean: {}
    require_code_for_disarm:
      name: Require Code for Disarming / Code requis pour le désarmement
      description: |
        If enabled, requires a valid PIN/RFID to disarm (strongly recommended for security).
        Si activé, nécessite un code valide pour désarmer (recommandé pour la sécurité).
      default: true
      selector:
        boolean: {}

trigger:
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input keypad
      command: arm
    id: keypad_event

  - platform: state
    entity_id: !input mirror_alarm_panel
    id: alarmo_state_change

variables:
  language: !input language
  pin_list_var: !input pin_list
  pin_list: "{{ pin_list_var.split(';') | map('trim') | select('!=', '') | list }}"
  rfid_list_var: !input rfid_list
  rfid_list: "{{ rfid_list_var.split(';') | map('trim') | select('!=', '') | list }}"
  all_valid_codes: "{{ pin_list + rfid_list }}"

  # Get entered code from event
  entered_code: "{{ trigger.event.data.args.code | default('') | trim }}"
  arm_mode: "{{ trigger.event.data.args.arm_mode | default(-1) | int }}"

  # Validation
  is_code_provided: "{{ entered_code != '' }}"
  is_code_valid: "{{ entered_code in all_valid_codes }}"

  # Check requirements
  require_arm: !input require_code_for_arm
  require_disarm: !input require_code_for_disarm

  # Determine action type
  action_type: >
    {% if arm_mode == 0 %}
      disarm
    {% elif arm_mode == 1 %}
      arm_home
    {% elif arm_mode == 2 %}
      arm_night
    {% elif arm_mode == 3 %}
      arm_away
    {% else %}
      unknown
    {% endif %}

  # Check if we should execute
  should_execute: >
    {% if action_type == 'disarm' %}
      {{ not require_disarm or is_code_valid }}
    {% elif action_type in ['arm_home', 'arm_night', 'arm_away'] %}
      {{ not require_arm or is_code_valid }}
    {% else %}
      false
    {% endif %}

  # Translation strings
  text_arm_home: "{{ 'Arm Home' if language == 'EN' else 'Armer à la maison' }}"
  text_arm_night: "{{ 'Arm Night' if language == 'EN' else 'Armer la nuit' }}"
  text_arm_away: "{{ 'Arm Away' if language == 'EN' else 'Armer à l\'extérieur' }}"
  text_disarm: "{{ 'Disarm' if language == 'EN' else 'Désarmer' }}"
  text_invalid_code: "{{ 'Invalid code' if language == 'EN' else 'Code invalide' }}"

action:
  - choose:
      # === KEYPAD EVENT HANDLING ===
      - conditions:
          - condition: trigger
            id: keypad_event
        sequence:
          - choose:
              # --- VALID CODE: Execute arm/disarm ---
              - conditions: "{{ should_execute }}"
                sequence:
                  # DISARM
                  - conditions: "{{ action_type == 'disarm' }}"
                    sequence:
                      - service: alarm_control_panel.alarm_disarm
                        target:
                          entity_id: !input alarm_panel
                        data:
                          code: !input default_pin
                      - service: alarm_control_panel.alarm_disarm
                        target:
                          entity_id: !input mirror_alarm_panel
                        data:
                          code: "{{ entered_code }}"

                  # ARM HOME
                  - conditions: "{{ action_type == 'arm_home' }}"
                    sequence:
                      - service: alarm_control_panel.alarm_arm_home
                        target:
                          entity_id: !input alarm_panel
                        data:
                          code: !input default_pin
                      - service: alarm_control_panel.alarm_arm_home
                        target:
                          entity_id: !input mirror_alarm_panel
                        data:
                          code: "{{ entered_code }}"

                  # ARM NIGHT
                  - conditions: "{{ action_type == 'arm_night' }}"
                    sequence:
                      - service: alarm_control_panel.alarm_arm_night
                        target:
                          entity_id: !input alarm_panel
                        data:
                          code: !input default_pin
                      - service: alarm_control_panel.alarm_arm_night
                        target:
                          entity_id: !input mirror_alarm_panel
                        data:
                          code: "{{ entered_code }}"

                  # ARM AWAY
                  - conditions: "{{ action_type == 'arm_away' }}"
                    sequence:
                      - service: alarm_control_panel.alarm_arm_away
                        target:
                          entity_id: !input alarm_panel
                        data:
                          code: !input default_pin
                      - service: alarm_control_panel.alarm_arm_away
                        target:
                          entity_id: !input mirror_alarm_panel
                        data:
                          code: "{{ entered_code }}"

              # --- INVALID/MISSING CODE: Immediately fix LED ---
              - conditions: "{{ not should_execute }}"
                sequence:
                  # Wait briefly for keypad to process its optimistic LED change
                  - delay:
                      milliseconds: 100

                  # Force keypad LED to match Alarmo's actual state
                  - choose:
                      # If Alarmo is armed, force keypad to armed (red LED)
                      - conditions: "{{ states(mirror_alarm_panel) in ['armed_away', 'armed_home', 'armed_night', 'pending', 'triggered'] }}"
                        sequence:
                          - service: alarm_control_panel.alarm_arm_away
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin

                      # If Alarmo is disarmed, force keypad to disarmed (green LED)
                      - conditions: "{{ states(mirror_alarm_panel) == 'disarmed' }}"
                        sequence:
                          - service: alarm_control_panel.alarm_disarm
                            target:
                              entity_id: !input alarm_panel
                            data:
                              code: !input default_pin
                    default: []

      # === ALARMO STATE CHANGE HANDLING (Sync to Keypad) ===
      - conditions:
          - condition: trigger
            id: alarmo_state_change
        sequence:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "disarmed"
                sequence:
                  - service: alarm_control_panel.alarm_disarm
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin

              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "armed_home"
                sequence:
                  - service: alarm_control_panel.alarm_arm_home
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin

              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "armed_night"
                sequence:
                  - service: alarm_control_panel.alarm_arm_night
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin

              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "armed_away"
                sequence:
                  - service: alarm_control_panel.alarm_arm_away
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin

              - conditions:
                  - condition: state
                    entity_id: !input mirror_alarm_panel
                    state: "triggered"
                sequence:
                  - service: alarm_control_panel.alarm_trigger
                    target:
                      entity_id: !input alarm_panel
    default: []

mode: single
